<ion-header>
  <ion-toolbar>
    <ion-title>Event List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title>Event List</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>

    <ion-item *ngFor="let event of events">
      <ion-label>
        <h2>{{ event.category }}</h2>
        <p>{{ event.description }}</p>
        <p>{{ event.serviceProvider }}</p>
        <p>{{ event.serviceProviderDetails }}</p>
        <p>{{ event.date | date }}</p>
        <p><strong>Cost: </strong>{{ event.cost | currency:'KES' }}</p>
      </ion-label>
      <ion-button color="primary" slot="end" (click)="updateEvent(event.id!, event)">Edit</ion-button>
      <ion-button color="danger" slot="end" (click)="deleteEvent(event.id!)">Delete</ion-button>
    </ion-item>

  </ion-list>

</ion-content>
