<ion-header>
  <ion-toolbar>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="register-container">

    <h2>Create Account</h2>

    <!-- Name -->
    <ion-item>
      <ion-label position="floating">Full Name</ion-label>
      <ion-input type="text" [(ngModel)]="newUser.name"></ion-input>
    </ion-item>

    <!-- Email -->
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" [(ngModel)]="newUser.email"></ion-input>
    </ion-item>

    <!-- Password -->
    <ion-item>
      <ion-label position="floating">Password</ion-label>
      <ion-input #passwordInput type="password" [(ngModel)]="newUser.password"></ion-input>
      <ion-icon name="eye" slot="end" [appTogglePassword]="passwordInput"></ion-icon>  
    </ion-item>

    <!-- Confirm Password -->
    <ion-item>
      <ion-label position="floating">Confirm Password</ion-label>
      <ion-input #confirmPasswordInput type="password" [(ngModel)]="newUser.confirmPassword"></ion-input>
      <ion-icon name="eye" slot="end" [appTogglePassword]="confirmPasswordInput"></ion-icon>  
    </ion-item>

    <!-- Button -->
    <ion-button expand="block" (click)="register()">
      Register
    </ion-button>

    <!-- Error Message -->
    <p *ngIf="errorMessage" style="color: red;">
      {{ errorMessage }}
    </p>

  </div>

</ion-content>
