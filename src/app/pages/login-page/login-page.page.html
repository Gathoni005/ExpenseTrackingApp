<ion-header>
  <ion-toolbar color="primary">
    <ion-title>TrackSmart</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">

  <div class="login-container">

    
    <div class="logo-section">
      <img src="assets/images/ExpenseTrackingAppLogo.jpeg" alt="App Logo">
      <h1>TrackSmart</h1>
      <p>Manage your expenses easily</p>
    </div>

  
    <div class="login-card">

      <h2>Welcome </h2>
     

      <!-- Email -->
      <ion-item class="input-item">
        <ion-icon name="mail" slot="start"></ion-icon>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" placeholder="Email" [(ngModel)]="newUser.email" #email="ngModel" required email></ion-input>
      </ion-item>


      <!-- Password -->
      <ion-item class="input-item">
        <ion-icon name="lock-closed" slot="start"></ion-icon>
        <ion-label position="floating">Password</ion-label>
        <ion-input #passwordInput type="password" placeholder="Password" [(ngModel)]="newUser.password"></ion-input>
        <ion-icon name="eye" slot="end" class="eye-icon" [appTogglePassword]="passwordInput"></ion-icon>
      </ion-item>

      <!-- Login Button -->
      <ion-button expand="block" class="login-btn" (click)="login()">
        Login
      </ion-button>

      <p class="register-text">Don't have an account?</p>

      <!-- Register -->
       <ion-button expand="block" fill="outline" (click)="goToRegister()">
  Register
</ion-button>
      
      

    </div>

  </div>

</ion-content>
